# Test Application
spring.application.name=05_java_enterprice_assignment_4_individual-test

# Test H2
spring.datasource.url=jdbc:h2:mem:test-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Test JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Test Data.sql
spring.sql.init.mode=never

# Test H2 Console
spring.h2.console.enabled=false

# Test JWT
jwt.secret=ThisIsTotallyNotASuperSecretKeyPleaseDoNotHackMeThanks123456
